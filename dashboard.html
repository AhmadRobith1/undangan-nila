<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Link Undangan (Database Sheets)</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5ede6;
            font-family: sans-serif;
            padding: 40px 15px;
        }

        .card-custom {
            max-width: 1000px;
            margin: auto;
            background: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #5D4037;
            font-weight: bold;
        }

        .btn-brown {
            background: #5D4037;
            color: white;
            border: none;
        }

        .btn-brown:hover {
            background: #4b332c;
            color: white;
        }

        table {
            margin-top: 20px;
        }

        .search-box {
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .alert-custom {
            display: none;
        }

        .loading-text {
            text-align: center;
            font-style: italic;
            color: #888;
            padding: 15px;
        }
    </style>
</head>

<body>

    <div class="card-custom">

        <h2>Dashboard Link Undangan</h2>

        <div class="row g-3">
            <div class="col-md-9">
                <input type="text" id="namaInput" class="form-control" placeholder="Masukkan Nama Tamu">
            </div>
            <div class="col-md-3 d-grid">
                <button class="btn btn-brown" id="btnBuat" onclick="tambahLink()">
                    Buat Link
                </button>
            </div>
        </div>

        <div class="alert alert-danger mt-3 alert-custom" id="alertNama">
            Nama sudah ada!
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" class="form-control" placeholder="Cari nama tamu..."
                onkeyup="searchNama()">
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle text-center">
                <thead class="table-dark">
                    <tr>
                        <th>Nama</th>
                        <th>Link</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="3" class="loading-text" id="statusKoneksi">Menghubungkan ke database Google
                            Sheets...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwpTnCKKdgoT-ssS07Qk9E2xKZ_0R1v0tKdl95kBBFoFJnhdCOjq9uNQWF5Kv9pM0Kb/exec";

        const DOMAIN_UNDANGAN = "https://ahmadrobith1.github.io/undangan-nila/";

        let dataTamu = [];

        window.addEventListener('DOMContentLoaded', muatDataDariSheets);

        // Fungsi membuat template pesan WhatsApp secara otomatis (sudah dirapikan jarak spasinya)
        function buatTemplatePesan(nama, link) {
            return `Kepada Yth.
Bapak/Ibu/Saudara/i
*${nama}*
_______

Tanpa mengurangi rasa hormat, perkenankan kami mengundang Bapak/Ibu/Saudara/i, teman sekaligus sahabat, untuk menghadiri acara pernikahan kami.

Berikut link undangan kami, untuk info lengkap dari acara, bisa kunjungi :

${link}

Merupakan suatu kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan untuk hadir dan memberikan doa restu.

Note:
Untuk mendapatkan hasil yg bagus, harap buka melalui google chrome terupdate.

Terima Kasih

Hormat kami,
Nila dan Arief`;
        }

        function muatDataDariSheets() {
            fetch(SCRIPT_URL)
                .then(response => response.json())
                .then(data => {
                    // Petakan data dari Sheets dan buatkan pesan otomatis untuk tiap tamu
                    dataTamu = data.map(item => ({
                        nama: item.nama,
                        link: item.link,
                        pesan: buatTemplatePesan(item.nama, item.link)
                    }));

                    dataTamu.reverse(); // Membalik urutan agar data terbaru di atas
                    renderTable();
                })
                .catch(error => {
                    console.error("Gagal memuat:", error);
                    document.getElementById('statusKoneksi').innerText = "Gagal memuat database.";
                });
        }

        function tambahLink() {
            const namaInput = document.getElementById('namaInput');
            const btnBuat = document.getElementById('btnBuat');
            const nama = namaInput.value.trim();
            const alertNama = document.getElementById('alertNama');

            if (nama === '') return;

            const sudahAda = dataTamu.some(item => item.nama.toLowerCase() === nama.toLowerCase());

            if (sudahAda) {
                alertNama.style.display = 'block';
                setTimeout(() => { alertNama.style.display = 'none'; }, 2500);
                return;
            }

            btnBuat.innerText = "Menyimpan...";
            btnBuat.disabled = true;

            const namaUrl = encodeURIComponent(nama);
            const link = `${DOMAIN_UNDANGAN}?to=${namaUrl}`;
            const pesan = buatTemplatePesan(nama, link);

            // Mengirim request ke Google Apps Script
            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    action: "tambah",
                    nama: nama,
                    link: link
                })
            })
                .then(() => {
                    dataTamu.unshift({
                        nama: nama,
                        link: link,
                        pesan: pesan
                    });

                    renderTable();
                    namaInput.value = '';
                })
                .catch(err => {
                    console.error("Error saat menyimpan:", err);
                    alert("Terjadi gangguan koneksi internet.");
                })
                .finally(() => {
                    btnBuat.innerText = "Buat Link";
                    btnBuat.disabled = false;
                });
        }

        function renderTable() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            if (dataTamu.length === 0) {
                tableBody.innerHTML = `
                <tr>
                    <td colspan="3" class="text-muted p-3">Belum ada data tamu</td>
                </tr>`;
                return;
            }

            dataTamu.forEach((item, index) => {
                tableBody.innerHTML += `
                <tr class="${index % 2 == 0 ? 'table-secondary' : ''}">
                    <td><strong>${item.nama}</strong></td>
                    <td style="max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                        <a href="${item.link}" target="_blank" class="text-decoration-none">${item.link}</a>
                    </td>
                    <td>
                        <div style="display:flex; justify-content:center; gap:6px; flex-wrap:wrap;">
                            <button class="btn btn-sm btn-success" onclick="copyPesan(this, ${index})">Copy</button>
                            <button class="btn btn-sm btn-danger" onclick="hapusData('${item.nama}', ${index})">Hapus</button>
                        </div>
                    </td>   
                </tr>`;
            });
        }

        function copyPesan(btn, index) {
            const targetPesan = dataTamu[index].pesan;
            navigator.clipboard.writeText(targetPesan).then(() => {
                const textAwal = btn.innerText;
                btn.innerText = "Copied!";
                btn.classList.replace("btn-success", "btn-primary");

                setTimeout(() => {
                    btn.innerText = textAwal;
                    btn.classList.replace("btn-primary", "btn-success");
                }, 1500);
            }).catch(err => {
                alert('Gagal menyalin teks otomatis.');
            });
        }

        function hapusData(nama, index) {
            const konfirmasi = confirm(`Yakin ingin menghapus ${nama}?`);
            if (!konfirmasi) return;

            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    action: "hapus",
                    nama: nama
                })
            })
                .then(() => {
                    dataTamu.splice(index, 1);
                    renderTable();
                })
                .catch(err => console.error(err));
        }

        function searchNama() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#tableBody tr');

            rows.forEach(row => {
                if (row.children[0]) {
                    const nama = row.children[0].textContent.toLowerCase();
                    row.style.display = nama.includes(input) ? '' : 'none';
                }
            });
        }
    </script>
</body>

</html>
